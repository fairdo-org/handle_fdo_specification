<h3>[S-3] PID Record Parsing into an FDO Record</h3>
<p><b>Input:</b> JSON</p>
<p>
    <b>Process:</b> Map all handle values from the JSON to FDO attributes as described in [H2-2].
</p>
<p>
    <b>Output:</b> List of attributes a<sub>1</sub>=(a<sub>1,def</sub>,a<sub>1,val</sub> ),...,
    a<sub>n</sub>=(a<sub>n,def</sub>,a<sub>n,val</sub> ). The a<sub>i,def</sub> can either be attribute definition PIDs
    or attribute names.
</p>
